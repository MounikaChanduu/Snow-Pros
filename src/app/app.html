<nav class="top-bar">
  <div>
    <h1>Book My Stay</h1>
    <small>Find hotels, manage rooms, and handle bookings in one place.</small>
  </div>

  <div class="nav-links" *ngIf="!isLoggedIn()">
    <a routerLink="/login" routerLinkActive="active">User Login</a>
    <a routerLink="/register" routerLinkActive="active">Register</a>
    <a routerLink="/admin-login" routerLinkActive="active">Admin Login</a>
  </div>

  <div class="nav-links" *ngIf="isLoggedIn() && isUser()">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/hotels" routerLinkActive="active">Hotels</a>
    <a routerLink="/book" routerLinkActive="active">Reservations</a>
    <a routerLink="/booking-history" routerLinkActive="active">My Bookings</a>
    <button type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <div class="nav-links" *ngIf="isLoggedIn() && isAdmin()">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/hotel-admin" routerLinkActive="active">Add Hotels</a>
    <a routerLink="/room-admin" routerLinkActive="active">Add Rooms</a>
    <button type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>
</nav>

<main class="main">
  <router-outlet></router-outlet>
</main>
